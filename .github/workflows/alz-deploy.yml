name: ALZ Deploy

on:
  push:
    branches: [main]
    paths: ['environments/**', 'modules/**']
  pull_request:
    branches: [main]
    paths: ['environments/**', 'modules/**']

# CRITICAL: id-token: write must be here — secrets: inherit does not propagate
permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: read

jobs:
  # ── Shared infrastructure first ─────────────────────────────
  shared-03-management:
    uses: ./.github/workflows/layer-03-management.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
    secrets: inherit

  shared-04-hub:
    needs: shared-03-management
    uses: ./.github/workflows/layer-04-hub.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
    secrets: inherit

  # ── Dev environment ──────────────────────────────────────────
  dev-01-mg:
    needs: shared-04-hub
    uses: ./.github/workflows/layer-01-mg.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: dev
    secrets: inherit

  dev-02-policy:
    needs: dev-01-mg
    uses: ./.github/workflows/layer-02-policy.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: dev
    secrets: inherit

  dev-05-workload:
    needs: dev-02-policy
    uses: ./.github/workflows/layer-05-workload.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: dev
    secrets: inherit

  # ── AVNM — after both spokes exist ──────────────────────────
  # AVNM reads spoke VNet IDs from state — must run after workload
  # On first deploy: dev workload runs, then AVNM, then prod
  shared-05-avnm:
    needs: dev-05-workload
    uses: ./.github/workflows/layer-05-avnm.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
    secrets: inherit

  # ── Prod environment (gate fires here) ───────────────────────
  prod-01-mg:
    needs: shared-05-avnm
    uses: ./.github/workflows/layer-01-mg.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: prod
    secrets: inherit

  prod-02-policy:
    needs: prod-01-mg
    uses: ./.github/workflows/layer-02-policy.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: prod
    secrets: inherit

  prod-05-workload:
    needs: prod-02-policy
    uses: ./.github/workflows/layer-05-workload.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
      env: prod
    secrets: inherit

  # ── Re-run AVNM after prod spoke added ───────────────────────
  shared-05-avnm-final:
    needs: prod-05-workload
    uses: ./.github/workflows/layer-05-avnm.yml
    with:
      action: ${{ github.event_name == 'pull_request' && 'plan' || 'apply' }}
    secrets: inherit
